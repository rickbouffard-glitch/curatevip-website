// ── Inline renderer ──────────────────────────────────────────
function renderInline(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>');
}

// ── Markdown renderer ────────────────────────────────────────
function renderMarkdown(md) {
  const lines = md.split('\n');
  let html = '';
  let i = 0;

  while (i < lines.length) {
    const line = lines[i];

    if (line.startsWith('# ')) {
      html += `<h1>${renderInline(line.slice(2))}</h1>`;
      i++;
    } else if (line.startsWith('## ')) {
      html += `<h2>${renderInline(line.slice(3))}</h2>`;
      i++;
    } else if (line.startsWith('### ')) {
      html += `<h3>${renderInline(line.slice(4))}</h3>`;
      i++;
    } else if (line.startsWith('```')) {
      const codeLines = [];
      i++;
      while (i < lines.length && !lines[i].startsWith('```')) {
        codeLines.push(lines[i].replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'));
        i++;
      }
      i++;
      html += `<pre><code>${codeLines.join('\n')}</code></pre>`;
    } else if (line.startsWith('|') && line.trim().length > 1) {
      const tableLines = [];
      while (i < lines.length && lines[i].startsWith('|')) {
        tableLines.push(lines[i]);
        i++;
      }
      const rows = tableLines
        .filter(l => !/^\|[\s\-:|]+\|$/.test(l.replace(/ /g, '')))
        .map(l => l.split('|').slice(1, -1).map(c => c.trim()));
      if (rows.length > 0) {
        html += '<div style="overflow-x:auto;margin:12px 0 20px"><table>';
        html += '<thead><tr>' + rows[0].map(c => `<th>${renderInline(c)}</th>`).join('') + '</tr></thead>';
        html += '<tbody>';
        rows.slice(1).forEach(row => {
          html += '<tr>' + row.map(c => `<td>${renderInline(c)}</td>`).join('') + '</tr>';
        });
        html += '</tbody></table></div>';
      }
    } else if (line.trim() === '---') {
      html += '<hr>';
      i++;
    } else if (line.startsWith('- ') || line.startsWith('* ')) {
      html += '<ul>';
      while (i < lines.length && (lines[i].startsWith('- ') || lines[i].startsWith('* '))) {
        html += `<li>${renderInline(lines[i].slice(2))}</li>`;
        i++;
      }
      html += '</ul>';
    } else if (line.trim() === '') {
      i++;
    } else {
      html += `<p>${renderInline(line)}</p>`;
      i++;
    }
  }
  return html;
}

const ARCHITECTURE_MD = `# CurateVIP — Backend Architecture

## Overview

CurateVIP curates venues (hotels, restaurants, social spots) for a specific member based on their speed profile — a two-axis classification of the member's pace x environment preference. The core value is in the curation engine: what gets included, what gets filtered, and in what order.

---

## Request lifecycle — /api/curate

### 1. Profile resolution

speedProfile from the member's onboarding carries environment keys per intent (TABLE, STAY, SOCIAL). The server maps those to canonical CCTF environment names and guards against stale defaults that cross category boundaries.

### 2. Cache check

\`market_venue_cache\` is queried first. A hit bypasses Claude entirely and streams the cached result directly. Cache TTL is 7 days. Cache is busted manually via POST /api/reset-cache or the admin panel.

### 3. Brave Search — quality signals

On a cache miss, Brave Search runs before Claude. Three parallel query sets fan out:

- TABLE: 14 queries (Michelin, James Beard, Forbes Table, city-specific dining press)
- STAY: 9 queries (Forbes Five Star, Michelin Key, AAA Five Diamond, LHW/SLH premium tier)
- SOCIAL: 6 queries (rooftop, bar, private club, social scene signals)

Results are cached in \`quality_signals_cache\` for 7 days. The raw snippets are passed into the curation prompt as grounding context and held for Signal Guard.

### 4. Claude Sonnet — curation

A structured prompt including:
- The member's resolved CCTF environment + adjacent environments for cross-tier picks
- Quality signal block (live Brave Search snippets)
- Seed reference sweep (confirmed/blocked venues for the market)
- Hard disqualifiers and quality floor rules

Claude returns a JSON stream. Venue objects are extracted incrementally and streamed to the client as they complete so the frontend can render cards progressively.

### 5. Post-filter chain

After Sonnet picks arrive, six guards run in sequence:

| Guard | What it does |
|---|---|
| Signal Guard | Haiku validates each candidate against Brave snippets; drops not_found picks |
| Geo guard | Removes venues outside the requested market |
| Tier guard | Removes venues whose environment does not match the resolved tier |
| Seed block | Hard-removes any venue in seed.js with blocked: true |
| Env block | Removes venues whose environment conflicts with category |
| Surrounding block | Removes cross-market venues unless includeSurrounding is set |

Seed-confirmed venues (confirmed: true) bypass Signal Guard — they have a standing signal by definition.

### 6. Signal Guard — Haiku validation pass

Signal Guard sends up to 50 Brave Search snippets plus the Sonnet candidate list to Claude Haiku asking for found | not_found | uncertain per venue. not_found picks are dropped unless seed-confirmed. The call has a 10-second timeout and is non-fatal — if Haiku errors, the guard skips.

### 7. Streaming response

Filtered venues are written as text/event-stream. The frontend renders each card as it arrives. The full result is written to \`market_venue_cache\` at the end.

---

## CCTF — two-axis classification

CCTF (CurateVIP Classification and Tier Framework) maps member intent to one of 11 environments:

- **TABLE:** Provision · Convivial · Electric · Gallery · Vanguard · Verandah
- **STAY:** Sanctuary · Atelier · Estate · Couture · Vanguard
- **SOCIAL:** Gallery · Electric · Plunge · Shadow

The two-axis model: speed tier (pace/stimulus level) x environment lean (physical/social character of the space).

---

## Quality floor

**Primary credentials** — qualify a venue standalone regardless of price:
- Forbes Five Star
- Michelin Key
- AAA Five Diamond
- Flagship brand (Aman, Four Seasons, Ritz-Carlton, etc.)

**Secondary credentials** — qualify only with confirmed $500+/night:
- Leading Hotels of the World (LHW)
- Small Luxury Hotels (SLH)
- Relais & Chateaux
- Preferred Hotels & Resorts Legend Collection

Venues with only secondary credentials below the price floor are filtered out.

---

## Booking pipeline

Each venue carries a bookingMode:

- \`liteapi\` — LiteAPI attempted first
- \`ratehawk\` — RateHawk used directly
- \`request\` — No live rates; frontend shows concierge CTA

The waterfall (LiteAPI → RateHawk → request) is resolved internally by \`bookingAdapter.js\`. Rate deduplication normalizes both provider shapes into a common format.

---

## Layer separation (June 2026 refactor)

The 856-line /api/curate handler was extracted from server.js into \`engine/curate.js\` as a standalone function: curate(params, deps, res). Dependencies (Anthropic client, Supabase client, vision helper) are injected via deps. server.js dropped from ~3,540 to ~2,610 lines. The route is now 3 lines.

---

## Data flow summary

\`\`\`
Client
  POST /api/curate
    Cache hit  → stream from market_venue_cache
    Cache miss
      Brave Search (14/9/6 queries, parallelized)
      Claude Sonnet (structured prompt + stream)
      Signal Guard (Haiku, non-fatal)
      Post-filter chain (geo → tier → seed-block → env → surrounding)
      Photo enrichment (async, parallel)
      Write market_venue_cache → stream to client
\`\`\``;

| Column | Type | Notes |
|---|---|---|
| id | uuid PK | |

## Seed vs. database

seed.js is the authoritative venue registry, checked into version control and loaded at startup. Supabase tables store derived, cached, or user-generated data — not the canonical venue list.

| Field | Meaning |
|---|---|
| id | Stable slug, unique identifier throughout the app |
| confirmed: true | Venue passes quality floor — bypasses Signal Guard |
| blocked: true | Permanently excluded regardless of AI picks |
| environment | CCTF environment classification |
| environment_lean | Optional lean modifier (dining, social, hotel) |
| liteApiId | LiteAPI hotel ID for live rate lookup |
| bookingMode | liteapi, ratehawk, or request |
| photoOverride | Override photo — bypasses Google Places entirely |`;
